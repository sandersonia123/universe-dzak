<style>
/* ===== Game Layout ===== */
.game-wrapper { display: flex; gap: 24px; align-items: flex-start; margin-top: 16px; }

.dialog-panel {
  flex: 3; background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 28px; min-height: 360px;
  display: flex; flex-direction: column;
}
.dialog-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  padding-bottom: 16px; border-bottom: 1.5px solid var(--border);
}
.dialog-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--accent); color: #fff; display: flex;
  align-items: center; justify-content: center; font-size: 1rem;
  font-weight: 700; flex-shrink: 0;
}
.dialog-speaker { font-weight: 600; color: var(--primary); font-size: 1rem; }
.dialog-text {
  font-size: 1.05rem; line-height: 2; color: var(--text);
  white-space: pre-wrap; flex: 1;
}
.dialog-text .highlight { color: var(--accent); font-weight: 500; }

.choice-panel {
  flex: 1.4; background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 24px; position: sticky; top: 80px;
}
.choice-panel-title {
  font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
  color: var(--text-light); margin-bottom: 16px; font-weight: 600;
}
.choice-list-game { display: flex; flex-direction: column; gap: 10px; }
.choice-btn-game {
  padding: 14px 18px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); background: var(--card); cursor: pointer;
  font-size: 0.92rem; text-align: left; transition: all 0.2s;
  color: var(--text); line-height: 1.5;
}
.choice-btn-game:hover {
  border-color: var(--accent); background: var(--accent-bg); color: var(--accent);
}
.choice-btn-game:active { transform: scale(0.98); }

/* ===== Ending ===== */
.ending-card {
  text-align: center; padding: 32px 20px;
}
.ending-label {
  display: inline-block; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 3px; color: var(--accent); border: 1.5px solid var(--accent);
  padding: 6px 20px; border-radius: 20px; margin-bottom: 20px;
}
.ending-text {
  font-size: 1.1rem; line-height: 2; color: var(--text);
  max-width: 560px; margin: 0 auto;
}
.ending-actions { margin-top: 28px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ===== Start Screen ===== */
.start-screen {
  text-align: center; padding: 48px 20px;
}
.start-screen .story-icon {
  font-size: 2.4rem; margin-bottom: 16px; color: var(--accent);
}
.start-screen h3 {
  font-size: 1.6rem; color: var(--primary); font-weight: 600;
  margin-bottom: 8px;
}
.start-screen .subtitle {
  color: var(--text-light); font-size: 0.95rem; margin-bottom: 28px;
}
.ending-tracker {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin-top: 24px;
}
.ending-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 0.82rem;
  border: 1.5px solid var(--border); color: var(--text-light);
  transition: all 0.3s;
}
.ending-badge.found {
  border-color: var(--accent); color: var(--accent); background: var(--accent-bg);
}
.ending-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.ending-badge.found .dot { background: var(--accent); }

/* ===== Path History ===== */
.path-bar {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 16px;
  padding-top: 16px; border-top: 1px solid var(--border);
}
.path-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--accent-bg);
  border: 1.5px solid var(--accent);
}
.path-dot.active { background: var(--accent); }

/* ===== Choices Inline (used in path view) ===== */
.choices-inline { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.78rem; color: var(--text-light); }
.choices-inline span { background: var(--accent-bg); padding: 2px 8px; border-radius: 4px; }

/* ===== Node Progress & Badge ===== */
.node-progress-bar {
  display: flex; align-items: center; gap: 8px; margin-top: 4px;
}
.node-progress-track {
  flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.node-progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease;
}
.node-badge-earned {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
  background: #fef3c7; color: #92400e; border: 1.5px solid #f59e0b;
  margin-top: 8px; animation: badgePop 0.5s ease;
}
@keyframes badgePop {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

@media (max-width: 768px) {
  .game-wrapper { flex-direction: column; }
  .choice-panel { position: static; }
  .dialog-panel { min-height: 200px; padding: 20px; }
  .choice-panel { padding: 20px; }
  .start-screen h3 { font-size: 1.2rem; }
}
</style>

<script>
/* ================================================================
   配置
   ================================================================ */
const SUPABASE_URL = 'https://wnrakpknwtrpufqiammy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InducmFrcGtud3RycHVmcWlhbW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDk2NTIsImV4cCI6MjA5ODYyNTY1Mn0.nY_OMMs9PvZ0mLuCZ8NyouHob9tApX4RgCPkcWWyH0Q';
const DEV_EMAIL = 'dev@dzak.local';
const SB_AUTH = SUPABASE_URL + '/auth/v1';
const SB_REST = SUPABASE_URL + '/rest/v1';

function sbHeaders() {
  const h = { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
  const token = localStorage.getItem('dzak_sb_token');
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function sbSelect(table, opts) {
  let url = SB_REST + '/' + table + '?select=*';
  if (opts && opts.order) url += '&order=' + opts.order;
  const r = await fetch(url, { headers: sbHeaders() });
  if (!r.ok) throw new Error('查询失败: ' + r.status);
  return r.json();
}

async function sbInsert(table, data) {
  const r = await fetch(SB_REST + '/' + table, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || '插入失败'); }
  return r.json();
}

async function sbSignIn(password) {
  const r = await fetch(SB_AUTH + '/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: DEV_EMAIL, password: password })
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('dzak_sb_token', d.access_token);
    localStorage.setItem('dzak_sb_refresh', d.refresh_token);
    return true;
  }
  return false;
}

async function sbRestoreSession() {
  const rt = localStorage.getItem('dzak_sb_refresh');
  if (!rt) return false;
  const r = await fetch(SB_AUTH + '/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: rt })
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('dzak_sb_token', d.access_token);
    localStorage.setItem('dzak_sb_refresh', d.refresh_token);
    return true;
  }
  localStorage.removeItem('dzak_sb_token');
  localStorage.removeItem('dzak_sb_refresh');
  return false;
}

/* ====== 共享工具 ====== */
function getData(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e) { return d; } }
function setData(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function now() { return new Date().toLocaleString('zh-CN'); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const DEVELOPER_KEY = 'dzak2024';
function getUsers() { return getData('dzak_users', []); }
function setUsers(u) { setData('dzak_users', u); }
function getSession() { return getData('dzak_session', { user: null, role: null }); }
function setSession(s) { setData('dzak_session', s); }
function currentUser() { const s = getSession(); return s.user; }
function isDeveloper() { return getSession().role === 'developer'; }

function updateBadge() {
  const s = getSession();
  if (!s.user) { document.getElementById('userBadge').textContent = '未登录'; return; }
  document.getElementById('userBadge').textContent = s.role === 'developer' ? s.user + ' [开发]' : s.user + ' [访客]';
}

async function login() {
  const user = document.getElementById('loginUser').value.trim();
  const devKey = document.getElementById('loginDevKey').value.trim();
  const err = document.getElementById('loginError');
  if (!user) { err.textContent = '请输入用户名'; err.style.display = 'block'; return; }
  const isDev = devKey === DEVELOPER_KEY;
  if (isDev) {
    const ok = await sbSignIn(devKey);
    if (!ok) { err.textContent = '密钥验证失败'; err.style.display = 'block'; return; }
  }
  const users = getUsers();
  users.push({ username: user, role: isDev ? 'developer' : 'guest' });
  setUsers(users);
  const role = isDev ? 'developer' : 'guest';
  setSession({ user, role });
  err.style.display = 'none';
  closeModal('loginModal');
  updateBadge();
  if (isDev) toast('开发者模式', 'success');
  else toast('游客模式 · 浏览中');
}

function loginAsGuest() { setSession({ user: 'guest', role: 'guest' }); closeModal('loginModal'); updateBadge(); toast('游客模式 · 浏览中'); }
function openLoginModal() { document.getElementById('loginUser').value = ''; document.getElementById('loginDevKey').value = ''; document.getElementById('loginError').style.display = 'none'; openModal('loginModal'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.addEventListener('click', function(e) {
  document.querySelectorAll('.modal-overlay.active').forEach(m => { if (e.target === m) m.classList.remove('active'); });
});

function toast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
document.addEventListener('click', function(e) {
  const nav = document.getElementById('navLinks');
  const t = document.querySelector('.nav-toggle');
  if (!nav.contains(e.target) && !t.contains(e.target)) nav.classList.remove('open');
});

/* ================================================================
   游戏引擎
   ================================================================ */
const TOTAL_NODES = Object.keys(STORY.nodes).length;
let gameState = { path: [] };

function getVisitedNodes() {
  return getData('dzak_visited_nodes', []);
}

function saveVisitedNode(id) {
  const visited = getVisitedNodes();
  if (!visited.includes(id)) {
    visited.push(id);
    setData('dzak_visited_nodes', visited);
  }
}

function isAllNodesVisited() {
  return getVisitedNodes().length >= TOTAL_NODES;
}

function renderNodeProgress() {
  const visited = getVisitedNodes();
  const pct = Math.min(100, Math.round(visited.length / TOTAL_NODES * 100));
  const allDone = visited.length >= TOTAL_NODES;
  const html =
    '<div style="display:flex;justify-content:space-between">' +
    '<span>节点探索 ' + visited.length + '/' + TOTAL_NODES + '</span>' +
    (allDone ? '<span style="color:#f59e0b;font-weight:600">★ 全收集</span>' : '') +
    '</div>' +
    '<div class="node-progress-bar">' +
    '<div class="node-progress-track"><div class="node-progress-fill" style="width:' + pct + '%"></div></div>' +
    '<span style="font-size:0.72rem;color:var(--text-light);min-width:32px;text-align:right">' + pct + '%</span>' +
    '</div>' +
    (allDone ? '<div class="node-badge-earned">&#9733; 全节点探索者</div>' : '');
  const el = document.getElementById('nodeProgress');
  if (el) el.innerHTML = html;
  const startEl = document.getElementById('startNodeProgress');
  if (startEl) startEl.innerHTML = allDone ? html : '';
}

function getFoundEndings() {
  return getData('dzak_endings', []);
}

function saveEnding(id) {
  const found = getFoundEndings();
  if (!found.includes(id)) {
    found.push(id);
    setData('dzak_endings', found);
  }
}

function renderEndingTracker() {
  const found = getFoundEndings();
  const total = Object.keys(STORY.endings).length;
  const ids = Object.keys(STORY.endings);
  document.getElementById('endingTracker').innerHTML = ids.map(id => {
    const isFound = found.includes(id);
    return '<span class="ending-badge' + (isFound ? ' found' : '') + '">' +
      '<span class="dot"></span>' + STORY.endings[id].title +
      '</span>';
  }).join('');
}

function showStart() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
  renderEndingTracker();
  renderNodeProgress();
}

function startGame() {
  gameState = { path: ['n1'] };
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  saveVisitedNode('n1');
  renderNodeProgress();
  renderNode('n1');
}

function renderNode(nodeId) {
  const node = STORY.nodes[nodeId];
  if (!node) return;

  saveVisitedNode(nodeId);
  renderNodeProgress();

  document.getElementById('dialogText').innerHTML = escHtml(node.text);

  // Path bar
  const pathHtml = gameState.path.map((id, i) => {
    const isCurrent = i === gameState.path.length - 1;
    const isEnding = id.startsWith('ending');
    if (isEnding) return '';
    return '<span class="path-dot' + (isCurrent ? ' active' : '') + '" title="' + id + '"></span>';
  }).filter(Boolean).join('');
  document.getElementById('pathBar').innerHTML = pathHtml ? '<span style="font-size:0.72rem;color:var(--text-light);margin-right:6px">路径</span>' + pathHtml : '';

  // Choices
  const choiceList = document.getElementById('choiceList');
  if (!node.choices || node.choices.length === 0) {
    choiceList.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text-light);font-size:0.85rem">— 终 —</div>';
    return;
  }

  choiceList.innerHTML = node.choices.map((c, i) =>
    '<button class="choice-btn-game" onclick="makeChoice(' + i + ')">→ ' + escHtml(c.text) + '</button>'
  ).join('');
}

function makeChoice(index) {
  const currentNode = STORY.nodes[gameState.path[gameState.path.length - 1]];
  if (!currentNode || !currentNode.choices || index >= currentNode.choices.length) return;

  const choice = currentNode.choices[index];
  const next = choice.next;

  if (next.startsWith('ending')) {
    gameState.path.push(next);
    saveEnding(next);
    renderEnding(next);
    renderNodeProgress();
  } else {
    gameState.path.push(next);
    renderNode(next);
  }
}

function renderEnding(endingId) {
  const ending = STORY.endings[endingId];
  if (!ending) return;

  document.getElementById('dialogText').innerHTML =
    '<div class="ending-card">' +
    '<div class="ending-label">' + escHtml(ending.title) + '</div>' +
    '<div class="ending-text">' + escHtml(ending.text) + '</div>' +
    '</div>';

  document.getElementById('pathBar').innerHTML = '';

  document.getElementById('choiceList').innerHTML =
    '<div style="text-align:center;padding:8px 0">' +
    '<button class="btn btn-primary" onclick="startGame()" style="margin-bottom:8px;width:100%">重新开始</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="showStart()">返回首页</button>' +
    '</div>';
}

/* ====== 留言 ====== */
async function getTriviaComments() {
  try { const data = await sbSelect('comments', { order: 'created_at.desc' }); return data.filter(c => c.page === 'trivia'); }
  catch(e) { console.error(e); return []; }
}

async function renderTriviaComments() {
  const list = document.getElementById('triviaComments');
  const comments = await getTriviaComments();
  if (!comments.length) { list.innerHTML = '<div class="empty-state"><p>暂无留言</p></div>'; return; }
  list.innerHTML = comments.map(c => '<div class="comment"><span class="user">' + escHtml(c.user_name) + '</span><span class="time">' + c.time + '</span><div class="text">' + escHtml(c.text) + '</div></div>').join('');
}

async function addTriviaComment() {
  const input = document.getElementById('triviaCommentInput');
  const text = input.value.trim();
  if (!text) return;
  try {
    await sbInsert('comments', { page: 'trivia', user_name: currentUser() || '匿名', text, time: now() });
    input.value = '';
    await renderTriviaComments();
    toast('留言已发布', 'success');
  } catch(e) { toast('发布失败: ' + e.message, 'error'); }
}

/* ====== 初始化 ====== */
(async function init() {
  await sbRestoreSession();
  updateBadge();
  renderEndingTracker();
  showStart();
  await renderTriviaComments();
})();
