<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说阅读 - universe of dzak</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">dzak</a>
    <button class="nav-toggle" onclick="toggleNav()">三</button>
    <div class="navbar-links" id="navLinks">
      <a href="index.html">首页</a>
      <a href="images.html">图像</a>
      <a href="novels.html" class="active">小说</a>
      <a href="games.html">剧情</a>
    </div>
    <div class="navbar-right">
      <span class="user-badge" id="userBadge" onclick="openLoginModal()">未登录</span>
    </div>
  </div>
</nav>

<div class="page-content">
  <div class="container">
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div>
        <h2>小说阅读</h2>
        <p>上传并阅读小说作品</p>
      </div>
      <button class="btn btn-accent" onclick="openAddNovelModal()" id="addNovelBtn">+ 上传小说</button>
    </div>

    <div id="novelList" class="novel-list"></div>

    <div id="readingArea" style="display:none">
      <button class="btn btn-ghost" onclick="closeReading()" style="margin-bottom:16px">← 返回列表</button>
      <div class="card">
        <h3 id="readingTitle" style="color:var(--primary);font-size:1.3rem;margin-bottom:16px"></h3>
        <div id="readingContent" class="novel-content"></div>
      </div>
    </div>

    <div class="comment-section" id="novelComments">
      <h3>留言板</h3>
      <div class="comment-form">
        <input type="text" id="novelCommentInput" placeholder="写一条留言……">
        <button class="btn btn-accent btn-sm" onclick="addNovelComment()">发送</button>
      </div>
      <div class="comment-list" id="novelCommentsList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addNovelModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addNovelModal')">X</button>
    <h2>上传小说</h2>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="novelTitleInput" placeholder="小说标题">
    </div>
    <div class="form-group">
      <label>内容</label>
      <textarea id="novelContentInput" rows="12" placeholder="粘贴或输入小说内容……"></textarea>
    </div>
    <div id="novelError" style="color:#dc2626;font-size:0.85rem;margin-bottom:10px;display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addNovelModal')">取消</button>
      <button class="btn btn-primary" onclick="addNovel()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('loginModal')">X</button>
    <h2>登录</h2>
    <div class="form-group"><label>用户名</label><input type="text" id="loginUser" placeholder="输入用户名"></div>
    <div class="form-group">
      <label>开发者密钥 <span style="font-weight:400;color:var(--text-light)">（可选，输入后方可上传/编辑内容）</span></label>
      <input type="password" id="loginDevKey" placeholder="输入开发者密钥">
    </div>
    <div class="modal-footer" style="flex-wrap:wrap">
      <button class="btn btn-primary" onclick="login()">进入</button>
    </div>
    <p id="loginError" style="color:#dc2626;font-size:0.85rem;margin-top:10px;display:none"></p>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:380px">
    <h2>确认删除</h2>
    <p id="confirmText" style="margin-bottom:16px">确定要删除吗？</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">取消</button>
      <button class="btn btn-danger" id="confirmBtn">删除</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">universe of dzak &mdash; 所有数据存储在云端 Supabase</div>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ================================================================
   配置
   ================================================================ */
const SUPABASE_URL = 'https://wnrakpknwtrpufqiammy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InducmFrcGtud3RycHVmcWlhbW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDk2NTIsImV4cCI6MjA5ODYyNTY1Mn0.nY_OMMs9PvZ0mLuCZ8NyouHob9tApX4RgCPkcWWyH0Q';
const DEV_EMAIL = 'dev@dzak.local';

const SB_AUTH = SUPABASE_URL + '/auth/v1';
const SB_REST = SUPABASE_URL + '/rest/v1';

function sbHeaders() {
  const h = { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
  const token = localStorage.getItem('dzak_sb_token');
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

async function sbSelect(table, opts) {
  let url = SB_REST + '/' + table + '?select=*';
  if (opts && opts.order) url += '&order=' + opts.order;
  const r = await fetch(url, { headers: sbHeaders() });
  if (!r.ok) throw new Error('查询失败: ' + r.status);
  return r.json();
}

async function sbInsert(table, data) {
  const r = await fetch(SB_REST + '/' + table, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || '插入失败'); }
  return r.json();
}

async function sbDelete(table, id) {
  const r = await fetch(SB_REST + '/' + table + '?id=eq.' + id, {
    method: 'DELETE',
    headers: sbHeaders()
  });
  if (!r.ok) throw new Error('删除失败');
}

async function sbSignIn(password) {
  const r = await fetch(SB_AUTH + '/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: DEV_EMAIL, password: password })
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('dzak_sb_token', d.access_token);
    localStorage.setItem('dzak_sb_refresh', d.refresh_token);
    return true;
  }
  return false;
}

async function sbRestoreSession() {
  const rt = localStorage.getItem('dzak_sb_refresh');
  if (!rt) return false;
  const r = await fetch(SB_AUTH + '/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: rt })
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('dzak_sb_token', d.access_token);
    localStorage.setItem('dzak_sb_refresh', d.refresh_token);
    return true;
  }
  localStorage.removeItem('dzak_sb_token');
  localStorage.removeItem('dzak_sb_refresh');
  return false;
}

function sbSignOut() {
  localStorage.removeItem('dzak_sb_token');
  localStorage.removeItem('dzak_sb_refresh');
}

/* ====== 共享工具 ====== */
function getData(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e) { return d; } }
function setData(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function now() { return new Date().toLocaleString('zh-CN'); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const DEVELOPER_KEY = 'dzak2024';
function getUsers() { return getData('dzak_users', []); }
function setUsers(u) { setData('dzak_users', u); }
function getSession() { return getData('dzak_session', { user: null, role: null }); }
function setSession(s) { setData('dzak_session', s); }
function currentUser() { const s = getSession(); return s.user; }
function isDeveloper() { return getSession().role === 'developer'; }

function updateBadge() {
  const s = getSession();
  if (!s.user) { document.getElementById('userBadge').textContent = '未登录'; return; }
  document.getElementById('userBadge').textContent = s.role === 'developer' ? s.user + ' [开发]' : s.user + ' [访客]';
}

async function login() {
  const user = document.getElementById('loginUser').value.trim();
  const devKey = document.getElementById('loginDevKey').value.trim();
  const err = document.getElementById('loginError');
  if (!user) { err.textContent = '请输入用户名'; err.style.display = 'block'; return; }

  const isDev = devKey === DEVELOPER_KEY;
  if (isDev) {
    const ok = await sbSignIn(devKey);
    if (!ok) { err.textContent = '密钥验证失败'; err.style.display = 'block'; return; }
  }

  const users = getUsers();
  if (users.some(u => u.username === user)) {
    err.textContent = '该用户名已被使用，请换一个';
    err.style.display = 'block';
    return;
  }
  users.push({ username: user, role: isDev ? 'developer' : 'guest' });
  setUsers(users);
  const role = isDev ? 'developer' : 'guest';
  setSession({ user, role });
  err.style.display = 'none';
  closeModal('loginModal');
  updateBadge();
  refreshUI();
  if (isDev) toast('开发者模式 · 可上传编辑内容', 'success');
  else toast('游客模式 · 浏览中');
}

function openLoginModal() { document.getElementById('loginUser').value = ''; document.getElementById('loginDevKey').value = ''; document.getElementById('loginError').style.display = 'none'; openModal('loginModal'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.addEventListener('click', function(e) {
  document.querySelectorAll('.modal-overlay.active').forEach(m => { if (e.target === m) m.classList.remove('active'); });
});

function toast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
document.addEventListener('click', function(e) {
  const nav = document.getElementById('navLinks');
  const t = document.querySelector('.nav-toggle');
  if (!nav.contains(e.target) && !t.contains(e.target)) nav.classList.remove('open');
});

/* ====== 小说 CRUD ====== */
async function getNovels() {
  try { return await sbSelect('novels', { order: 'created_at.desc' }); }
  catch(e) { console.error(e); return []; }
}

let currentNovelId = null;

async function renderNovelList() {
  const novels = await getNovels();
  const list = document.getElementById('novelList');

  if (!novels.length) {
    list.innerHTML = '<div class="empty-state"><p>暂无小说，点击上方「上传小说」添加</p></div>';
    return;
  }

  const dev = isDeveloper();
  list.innerHTML = novels.map(n =>
    `<div class="novel-item" onclick="openNovel('${n.id}')">
      <div>
        <div class="title">${escHtml(n.title)}</div>
        <div class="meta">${n.time} · ${n.content.length} 字</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openNovel('${n.id}')">阅读</button>
        ${dev ? `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();confirmDeleteNovel('${n.id}')">删除</button>` : ''}
      </div>
    </div>`
  ).join('');
}

function openAddNovelModal() {
  document.getElementById('novelTitleInput').value = '';
  document.getElementById('novelContentInput').value = '';
  document.getElementById('novelError').style.display = 'none';
  openModal('addNovelModal');
}

async function addNovel() {
  const title = document.getElementById('novelTitleInput').value.trim();
  const content = document.getElementById('novelContentInput').value.trim();
  const err = document.getElementById('novelError');

  if (!title) { err.textContent = '请输入标题'; err.style.display = 'block'; return; }
  if (!content) { err.textContent = '请输入内容'; err.style.display = 'block'; return; }

  try {
    await sbInsert('novels', { title, content, time: now() });
    closeModal('addNovelModal');
    await renderNovelList();
    toast('小说已保存', 'success');
  } catch(e) {
    err.textContent = '保存失败: ' + e.message;
    err.style.display = 'block';
  }
}

function openNovel(id) {
  (async function() {
    const novels = await getNovels();
    const n = novels.find(x => x.id === id);
    if (!n) return;
    currentNovelId = id;
    document.getElementById('novelList').style.display = 'none';
    document.getElementById('readingArea').style.display = 'block';
    document.getElementById('readingTitle').textContent = n.title;
    document.getElementById('readingContent').innerHTML = n.content.split('\n').filter(p => p.trim()).map(p => `<p>${escHtml(p)}</p>`).join('');
  })();
}

function closeReading() {
  currentNovelId = null;
  document.getElementById('novelList').style.display = '';
  document.getElementById('readingArea').style.display = 'none';
}

function confirmDeleteNovel(id) {
  document.getElementById('confirmText').textContent = '确定要删除这部小说吗？';
  document.getElementById('confirmBtn').onclick = async function() {
    try {
      await sbDelete('novels', id);
      closeModal('confirmModal');
      await renderNovelList();
      if (currentNovelId === id) closeReading();
      toast('小说已删除');
    } catch(e) {
      toast('删除失败: ' + e.message, 'error');
    }
  };
  openModal('confirmModal');
}

/* ====== 留言 ====== */
async function getNovelComments() {
  try {
    const data = await sbSelect('comments', { order: 'created_at.desc' });
    return data.filter(c => c.page === 'novels');
  } catch(e) { console.error(e); return []; }
}

async function renderNovelComments() {
  const list = document.getElementById('novelCommentsList');
  const comments = await getNovelComments();
  if (!comments.length) { list.innerHTML = '<div class="empty-state"><p>暂无留言</p></div>'; return; }
  list.innerHTML = comments.map(c =>
    `<div class="comment"><span class="user">${escHtml(c.user_name)}</span><span class="time">${c.time}</span><div class="text">${escHtml(c.text)}</div></div>`
  ).join('');
}

async function addNovelComment() {
  if (!currentUser()) { toast('请先登录后再留言', 'error'); return; }
  const input = document.getElementById('novelCommentInput');
  const text = input.value.trim();
  if (!text) return;
  try {
    await sbInsert('comments', { page: 'novels', user_name: currentUser(), text, time: now() });
    input.value = '';
    await renderNovelComments();
    toast('留言已发布', 'success');
  } catch(e) {
    toast('发布失败: ' + e.message, 'error');
  }
}

/* ====== UI 刷新 ====== */
function refreshUI() {
  const dev = isDeveloper();
  const btn = document.getElementById('addNovelBtn');
  if (btn) btn.style.display = dev ? '' : 'none';
}

/* ====== 初始化 ====== */
(async function init() {
  await sbRestoreSession();
  updateBadge();
  await renderNovelList();
  await renderNovelComments();
  refreshUI();
})();
</script>
</body>
</html>
